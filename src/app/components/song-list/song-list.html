<div class="container">
  
  <div class="header-row" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
    <h2>All Songs</h2>
    
    <mat-form-field appearance="outline" class="search-bar" style="width: 300px;">
      <mat-icon matPrefix>search</mat-icon>
      <input matInput [(ngModel)]="searchTerm" (keyup)="filterSongs()" placeholder="Search songs, artists...">
      @if (searchTerm) {
        <button matSuffix mat-icon-button (click)="searchTerm=''; filterSongs()">
          <mat-icon>close</mat-icon>
        </button>
      }
    </mat-form-field>
  </div>
  
  <div class="song-grid">
    @for (song of filteredSongs; track song.id) {
      <mat-card class="song-card" (click)="play(song)">
        <img mat-card-image [src]="song.coverUrl" alt="Album Art">
        <mat-card-content>
          <h3>{{ song.title }}</h3>
          <p>{{ song.artist }}</p>
        </mat-card-content>
        
        <mat-card-actions>
          <button mat-icon-button (click)="play(song); $event.stopPropagation()">
            <mat-icon>play_circle</mat-icon>
          </button>

          <button mat-icon-button (click)="addToPlaylist(song); $event.stopPropagation()">
            <mat-icon>playlist_add</mat-icon>
          </button>

          <button mat-icon-button (click)="toggleFavorite(song, $event)">
            <mat-icon [style.color]="song.isFavorite ? '#e91e63' : 'inherit'">
              {{ song.isFavorite ? 'favorite' : 'favorite_border' }}
            </mat-icon>
          </button>
        </mat-card-actions>
      </mat-card>
    } @empty {
      <div style="grid-column: 1 / -1; text-align: center; color: #b3b3b3; padding: 40px;">
        <mat-icon style="font-size: 48px; height: 48px;">search_off</mat-icon>
        <p>No songs found for "{{ searchTerm }}"</p>
      </div>
    }
  </div>
</div>
